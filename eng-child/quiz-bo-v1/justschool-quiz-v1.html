<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JustSchool — Знайдіть ідеального репетитора з англійської</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 28px 16px 60px;
  position: relative;
  overflow-x: hidden;
  background: #fff;
}

/* ─── BACKGROUND SVG ─── */
.bg-layer {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.bg-layer img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}

/* ─── QUIZ WRAP ─── */
#quiz-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 640px;
}

#quiz {
  width: 100%;
}

/* ─── MOBILE ─── */
@media (max-width: 640px) {
  .bg-layer img { object-position: 30% top; }
  body { padding: 16px 12px 40px; }
}

/* ─── LOGO ─── */
.logo-bar {
  display: flex;
  justify-content: center;
  margin-bottom: 24px;
}
.logo-bar svg { height: 38px; width: auto; }

/* ─── PROGRESS ─── */
.progress-wrap { margin-bottom: 20px; }
.progress-track {
  height: 6px;
  background: rgba(0,0,0,0.08);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #F16600;
  border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-label {
  font-size: 12px;
  color: #999;
  text-align: right;
  margin-top: 5px;
}

/* ─── BACK BUTTON ─── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  color: #aaa;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  padding: 0;
  margin-bottom: 20px;
  transition: color 0.2s;
}
.back-btn:hover { color: #F16600; }

/* ─── START SCREEN (combined hero + Q1) ─── */
.start-heading {
  font-size: 36px;
  font-weight: 700;
  color: #1a1a1a;
  line-height: 1.28;
  margin-bottom: 20px;
  text-align: center;
}
.start-heading .orange { color: #F16600; }
@media (max-width: 560px) { .start-heading { font-size: 22px; } }

.start-perks-title {
  font-size: 17px;
  font-weight: 600;
  color: #333;
  margin-bottom: 12px;
  text-align: center;
}
.start-benefits {
  list-style: none;
  margin-bottom: 28px;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}
.start-benefits li {
  font-size: 14px;
  font-weight: 400;
  color: #555;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  line-height: 1.4;
  text-align: left;
}
.start-benefits li:last-child { border-bottom: none; }
.start-benefits .bi { font-size: 20px; flex-shrink: 0; }

.start-q-title {
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 14px;
  text-align: center;
}


/* ─── QUESTION STEPS ─── */
.question-text {
  font-size: 21px;
  font-weight: 700;
  color: #1a1a1a;
  line-height: 1.35;
  margin-bottom: 8px;
}
.question-desc {
  font-size: 15px;
  color: #777;
  margin-bottom: 22px;
  line-height: 1.5;
}

/* ─── ANSWER BUTTONS ─── */
.options { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: #f7f7f7;
  border: 2px solid #F16600;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 16px;
  font-family: inherit;
  color: #1a1a1a;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  line-height: 1.4;
}
.opt-btn:hover {
  border-color: #FF9944;
  background: #fff8f2;
}
.opt-btn.selected {
  border-color: #F16600;
  background: #fff3e8;
  font-weight: 500;
}

/* ─── TEXT INPUT ─── */
.text-input {
  width: 100%;
  border: 2px solid #e8e8e8;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 16px;
  font-family: inherit;
  color: #1a1a1a;
  outline: none;
  transition: border-color 0.2s;
  background: #fcfcfc;
}
.text-input:focus { border-color: #F16600; background: #fff; }
.input-error { border-color: #e53e3e !important; }

/* ─── PRIMARY BUTTON ─── */
.primary-btn {
  display: block;
  width: 100%;
  background: #F16600;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 16px 24px;
  font-size: 17px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  text-align: center;
  line-height: 1.3;
}
.primary-btn:hover { background: #d45a00; }
.primary-btn:active { transform: scale(0.98); }

/* ─── SECTION HEADING (banners) ─── */
.section-heading {
  font-size: 21px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 20px;
  line-height: 1.35;
}

/* ─── BANNER 1: FEATURE CARDS ─── */
.feature-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 28px;
}
@media (max-width: 480px) { .feature-cards { grid-template-columns: 1fr; } }
.feat-card {
  background: #fff8f2;
  border: 1.5px solid #ffd9b3;
  border-radius: 14px;
  padding: 18px 16px;
}
.feat-card .feat-icon { font-size: 28px; margin-bottom: 10px; }
.feat-card .feat-title { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 5px; }
.feat-card .feat-desc { font-size: 13px; color: #666; line-height: 1.45; }

/* ─── BANNER 2: STATS ─── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}
@media (max-width: 480px) { .stats-grid { grid-template-columns: 1fr; } }
.stat-card { background: #f7f7f7; border-radius: 14px; padding: 20px 14px; text-align: center; }
.stat-value { font-size: 30px; font-weight: 800; color: #F16600; line-height: 1; margin-bottom: 8px; }
.stat-label { font-size: 13px; color: #666; line-height: 1.4; }

/* ─── BANNER 3: COMPARISON ─── */
.compare-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin-bottom: 28px;
  font-size: 14px;
}
.compare-table thead th {
  padding: 12px 16px;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  text-align: left;
}
.compare-table thead th.col-them { background: #f0f0f0; color: #777; border-radius: 10px 0 0 0; }
.compare-table thead th.col-us   { background: #F16600; color: #fff; border-radius: 0 10px 0 0; }
.compare-table tbody td {
  padding: 13px 16px;
  vertical-align: top;
  border-top: 1px solid #eee;
  line-height: 1.5;
  width: 50%;
}
.compare-table tbody td.col-them { background: #fafafa; color: #999; }
.compare-table tbody td.col-us   { background: #fff8f2; color: #1a1a1a; font-weight: 500; }
.compare-table tbody tr:last-child td.col-them { border-radius: 0 0 0 10px; }
.compare-table tbody tr:last-child td.col-us   { border-radius: 0 0 10px 0; }

.compare-mobile { display: none; margin-bottom: 28px; }
@media (max-width: 520px) { .compare-table { display: none; } .compare-mobile { display: block; } }
.cmp-row { border: 1.5px solid #ffd9b3; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; background: #fff8f2; }
.cmp-us-label { font-size: 11px; font-weight: 700; color: #F16600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.cmp-us   { font-size: 14px; color: #1a1a1a; font-weight: 600; margin-bottom: 8px; line-height: 1.45; }
.cmp-them-label { font-size: 11px; color: #bbb; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
.cmp-them { font-size: 13px; color: #bbb; text-decoration: line-through; line-height: 1.4; }

/* ─── LEAD FORM ─── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
.phone-row { display: flex; gap: 8px; }
.phone-code { flex-shrink: 0; width: 88px; }
.field-error { font-size: 12px; color: #e53e3e; margin-top: 5px; display: none; }
.field-error.visible { display: block; }
.privacy-note { font-size: 12px; color: #bbb; text-align: center; margin-top: 12px; line-height: 1.5; }

/* ─── THANK YOU ─── */
.ty-icon { font-size: 64px; text-align: center; margin-bottom: 16px; }
.ty-title { font-size: 26px; font-weight: 800; color: #1a1a1a; text-align: center; margin-bottom: 14px; line-height: 1.3; }
.ty-text  { font-size: 16px; color: #555; text-align: center; line-height: 1.65; margin-bottom: 20px; }
.pdf-sent-box {
  background: #fff8f2;
  border: 1.5px solid #ffd9b3;
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-align: left;
}
.pdf-sent-icon { font-size: 32px; flex-shrink: 0; }
.pdf-sent-text { font-size: 15px; color: #555; line-height: 1.55; }
.pdf-sent-text strong { color: #F16600; }
.call-note { font-size: 14px; color: #aaa; text-align: center; line-height: 1.5; }

/* ─── DIVIDER ─── */
.divider { border: none; border-top: 1px solid #f0f0f0; margin: 24px 0; }
</style>
</head>

/* Steps 1–13 count toward progress (13 total) */
var TOTAL = STEPS.length - 2;

var answers = {};
var currentStep = 0;

/* ═══════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════ */
function goTo(step) {
  currentStep = step;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* Called from option buttons — uses index to avoid HTML-escaping issues */
function pickOption(stepIdx, optIdx) {
  var step = STEPS[stepIdx];
  answers[step.key] = step.options[optIdx];
  goTo(stepIdx + 1);
}

function submitText(key, next) {
  var inp = document.getElementById('text-answer');
  var val = inp ? inp.value.trim() : '';
  if (!val) { if (inp) inp.classList.add('input-error'); return; }
  answers[key] = val;
  goTo(next);
}

function submitForm() {
  var name  = document.getElementById('lead-name').value.trim();
  var phone = document.getElementById('lead-phone').value.trim();
  var code  = document.getElementById('lead-code').value.trim();
  var email = document.getElementById('lead-email').value.trim();
  var ok = true;

  if (!name) {
    document.getElementById('err-name').classList.add('visible');
    document.getElementById('lead-name').classList.add('input-error');
    ok = false;
  } else {
    document.getElementById('err-name').classList.remove('visible');
    document.getElementById('lead-name').classList.remove('input-error');
  }
  if (!phone || phone.replace(/\D/g,'').length < 7) {
    document.getElementById('err-phone').classList.add('visible');
    document.getElementById('lead-phone').classList.add('input-error');
    ok = false;
  } else {
    document.getElementById('err-phone').classList.remove('visible');
    document.getElementById('lead-phone').classList.remove('input-error');
  }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('err-email').classList.add('visible');
    document.getElementById('lead-email').classList.add('input-error');
    ok = false;
  } else {
    document.getElementById('err-email').classList.remove('visible');
    document.getElementById('lead-email').classList.remove('input-error');
  }
  if (!ok) return;

  answers['email'] = email;
  var lead = Object.assign({}, answers, { name: name, phone: code + ' ' + phone, email: email, timestamp: new Date().toISOString() }, utm);

  /*
   * ── INTEGRATION POINT ──────────────────────────────────────
   * Replace console.log with your CRM / webhook:
   *   fetch('https://your-backend.com/leads', {
   *     method: 'POST',
   *     headers: { 'Content-Type': 'application/json' },
   *     body: JSON.stringify(lead)
   *   });
   * ───────────────────────────────────────────────────────────
   */
  console.log('[JustSchool] Lead:', lead);
  goTo(STEPS.length - 1);
}

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function logo() {
  return '<div class="logo-bar">' + LOGO_SVG + '</div>';
}

function progress(idx) {
  var pct = Math.round(((idx - 1) / TOTAL) * 100);
  return '<div class="progress-wrap"><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div><div class="progress-label">' + pct + '% виконано</div></div>';
}

function back(idx) {
  return '<button class="back-btn" onclick="goTo(' + (idx-1) + ')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Назад</button>';
}

function optButtons(stepIdx) {
  var step = STEPS[stepIdx];
  return step.options.map(function(opt, i) {
    var sel = answers[step.key] === opt ? ' selected' : '';
    return '<button class="opt-btn' + sel + '" onclick="pickOption(' + stepIdx + ',' + i + ')">' + opt + '</button>';
  }).join('');
}

/* ═══════════════════════════════════════
   SCREENS
═══════════════════════════════════════ */

    '<p class="start-perks-title">Пройдіть короткий тест — і отримайте:</p>' +

function renderChoice(idx) {

    (step.desc ? '<p class="question-desc">' + step.desc + '</p>' : '') +

function renderStats(idx) {
  var stats = [

function renderCompare(idx) {

    return '<div class="cmp-row"><div class="cmp-us-label">JustSchool ✓</div><div class="cmp-us">'+r[1]+'</div><div class="cmp-them-label">Інші школи</div><div class="cmp-them">'+r[0]+'</div></div>';

function renderForm(idx) {
  return (
    logo() + progress(idx) + back(idx) +
    '<h2 class="question-text">Залишилось зовсім небагато! 😊</h2>' +

function renderThankyou() {
  var email = answers['email'] || '';

    logo() +
    '<div style="text-align:center;padding:8px 0;">' +
      '<div class="ty-icon">🎉</div>' +
      '<h2 class="ty-title">Дякуємо!<br>Ми вже на зв\'язку</h2>' +
      '<p class="ty-text">Наш менеджер зателефонує вам найближчим часом і підбере ідеального репетитора з англійської саме для вашої дитини.</p>' +
      '<div class="pdf-sent-box">' +
        '<div class="pdf-sent-icon">📩</div>' +
        '<p class="pdf-sent-text">PDF-подарунок із корисними вправами та іграми для вивчення англійської буде відправлено вам на пошту' + (email ? ' <strong>' + email + '</strong>' : '') + '</p>' +
      '</div>' +

  );

/* ═══════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════ */
function render() {
  var step = STEPS[currentStep];
  var html = '';
  switch (step.type) {
    case 'start':    html = renderStart();            break;
    case 'choice':   html = renderChoice(currentStep); break;
    case 'text':     html = renderText(currentStep);   break;
    case 'banner1':  html = renderBanner1(currentStep);break;
    case 'stats':    html = renderStats(currentStep);  break;
    case 'compare':  html = renderCompare(currentStep);break;
    case 'form':     html = renderForm(currentStep);   break;
    case 'thankyou': html = renderThankyou();          break;
  }
  document.getElementById('quiz').innerHTML = html;
}

render();
