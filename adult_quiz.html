<script id="serverApp-state" type="application/json">{&q;transfer-translate-uk&q;:{&q;blackout-benefits.block1.item1&q;:&q;Уроки не списуються в разі вашої відсутності на занятті&q;,&q;blackout-benefits.block1.item2&q;:&q;Ми швидко організовуємо заняття з 9:00 до 21:00, як тільки у вас з&s;явиться зв&s;язок&q;,&q;blackout-benefits.block1.item3&q;:&q;У нас вже більше 100 викладачів з-за кордону, які завжди на зв&s;язку і готові викладати&q;,&q;blackout-benefits.block2.item1.body&q;:&q;Ні, зараз цього робити не потрібно. Раніше для відновлення балансу треба було звертатись у підтримку, але ми прибрали цю умову для вашої зручності, адже розуміємо складну ситуацію зі зв&s;язком та електропостачанням.&q;,&q;blackout-benefits.block2.item1.title&q;:&q;Якщо я пропустив урок, чи потрібно звертатись у підтримку, щоб мені його повернули на баланс?&q;,&q;blackout-benefits.block2.item2.body&q;:&q;Якщо не вийшло під&s;єднатися в запланований час, можна написати нам у месенджери або зателефонувати (посилання та номер телефону підтримки знайдеш внизу цієї сторінки), ми перенесемо заняття на будь-який комфортний для тебе день та час. Як тільки з’явиться світло та зв’язок, ми будемо готові запланувати урок протягом 30 хвилин.&q;,&q;blackout-benefits.block2.item2.title&q;:&q;Як відбувається процес організації уроку, коли в мене з’явився зв’язок?&q;,&q;blackout-benefits.block2.item3.body&q;:&q;Учителі з-за кордону мають стабільне підключення та готові швидко замінити українського викладача в разі аварійних відключень електропостачання.&q;,&q;blackout-benefits.block2.item3.title&q;:&q;Як це вплине на мої заняття?&q;,&q;blackout-benefits.header1&q;:&q;Як ми адаптувались до блекаутів&q;,&q;blackout-benefits.header2&q;:&q;Найпопулярніші запитання&q;,&q;messengers.title&q;:&q;Оберіть зручний для вас месенджер&q;,&q;messengers.write-to-telegram&q;:&q;Написати в Telegram&q;,&q;messengers.write-to-viber&q;:&q;Написати в Viber&q;,&q;onboarding.header.title&q;:&q;&q;,&q;UA&q;:&q;UA&q;,&q;v1.answers-for-adults-german.item4.text&q;:&q;Програма спеціально розроблена як для тих, хто ніколи не вивчав німецьку та готовий зануритися  у світ німецької мови&q;,&q;v1.answers-for-adults-german.item5.text&q;:&q;Методика навчання - комунікативний підхід. Німецькомовна атмосфера з перших хвилин навчання для швидшої адаптації&q;,&q;v1.answers-for-adults.item1.text&q;:&q;Уроки проходять в особистому кабінеті, через сайт. Це індивідуальні заняття з викладачем в реальному часі. У кабінеті вбудована платформа, де можливо не тільки спілкуватись, а й виконувати інтерактивні завдання. Залежно від рівня складності, завдання в інтерактивній формі.&q;,&q;v1.answers-for-adults.item1.title&q;:&q;Як проходить навчання&q;,&q;v1.answers-for-adults.item2.text&q;:&q;Для занять необхідно використовувати комп’ютер (або ноутбук) з робочою вебкамерою, мікрофоном або гарнітурою. Також можна використовувати телефон або планшет&q;,&q;v1.answers-for-adults.item2.title&q;:&q;На якому пристрої краще займатися?&q;,&q;v1.answers-for-adults.item3.text&q;:&q;Усі викладачі мають лінгвістичну або педагогічну освіту. Сертифікати (у т.ч. міжнародні), які підтверджують компетентність і достатній рівень знань мови&q;,&q;v1.answers-for-adults.item3.title&q;:&q;Хто наші викладачі?&q;,&q;v1.answers-for-adults.item4.text&q;:&q;Програма спеціально розроблена як для тих, хто ніколи не вивчав англійську, так і для тих, хто має достатній рівень знань!&q;,&q;v1.answers-for-adults.item4.title&q;:&q;Чи є обмеження за рівнем знань мови й віку?&q;,&q;v1.answers-for-adults.item5.text&q;:&q;Методика навчання - комунікативний підхід (communicative approach). В основі такого підходу - розвиток навичок мовлення. У результаті учень починає швидко розмовляти англійською мовою, вивчає теорію через приклади, запам&s;ятовує матеріал через практику, а не теорію&q;,&q;v1.answers-for-adults.item5.title&q;:&q;Яка в нас методика викладання?&q;,&q;v1.answers-for-adults-polish.item4.text&q;:&q;Програма спеціально розроблена для тих, хто ніколи не вивчав польську мову. На цьому курсі студент отримає базу для спілкування та розуміння польської мови&q;,&q;v1.answers-for-adults-polish.item5.text&q;:&q;Методика навчання - комунікативний підхід. Заняття складаються з інтерактивних вправ,\nа також аудіоприкладів від носіїв мови, що прискорює засвоєння матеріалу \nта  сприйняття мови&q;,&q;v1.answers-for-children.item1.text&q;:&q;Уроки проходять в особистому кабінеті, через сайт. Це індивідуальні заняття з викладачем у реальному часі. У кабінеті вбудована платформа, де дитина не тільки спілкується, а й виконує інтерактивні завдання. Залежно від рівня складності, завдання в ігровій або інтерактивній формі.&q;,&q;v1.answers-for-children.item1.title&q;:&q;Як проходить навчання&q;,&q;v1.answers-for-children.item2.text&q;:&q;Для занять необхідно використовувати комп’ютер (або ноутбук) з робочою вебкамерою, мікрофоном або гарнітурою. Також можна використовувати телефон або планшет&q;,&q;v1.answers-for-children.item2.title&q;:&q;На якому пристрої краще займатися?&q;,&q;v1.answers-for-children.item3.text&q;:&q;Усі викладачі мають лінгвістичну або педагогічну освіту. Сертифікати (у т.ч. міжнародні), які підтверджують компетентність і достатній рівень знань мови для навчання дітей. Також викладачі проходять курс дитячої психології, відповідно, можуть знайти підхід і зацікавити навчанням дітей с різним рівнем уваги, посидючості.&q;,&q;v1.answers-for-children.item3.title&q;:&q;Хто наші викладачі?&q;,&q;v1.answers-for-children.item4.text&q;:&q;Методика навчання - комунікативний підхід (communicative approach) в поєднанні з підходом повного фізичного реагування (total physical response approach — TPR).&q;,&q;v1.answers-for-children.item4.title&q;:&q;Яка в нас методика викладання?&q;,&q;v1.answers-for-children.item5.text&q;:&q;Так, можна бути присутнім, але тільки як спостерігач. Ми дуже просимо батьків довіритися нашим викладачам і дозволити навчальному процесу йти за наміченою програмою. А батьки можуть читати коментарі з оцінками про кожен урок.&q;,&q;v1.answers-for-children.item5.title&q;:&q;Чи можна батькам бути присутніми під час уроків?&q;,&q;v1.answers-for-children.item6.text&q;:&q;Програма спеціально розроблена для дітей від 6 до 17 років, у тому числі й для тих, хто ніколи не вивчав англійську мову. А якщо Ви старші, у нас є курс для дорослих!&q;,&q;v1.answers-for-children.item6.title&q;:&q;Чи є обмеження за рівнем знань мови й віку?&q;,&q;v1.answers-for-children-math.item1.text&q;:&q;Уроки проходять в особистому кабінеті, через сайт. Це індивідуальні заняття з викладачем у реальному часі. У кабінеті вбудована платформа, де дитина не тільки спілкується, а й виконує інтерактивні завдання. Залежно від віку й мети занять завдання в ігровій або інтерактивній формі.&q;,&q;v1.answers-for-children-math.item1.title&q;:&q;Як проходить навчання?&q;,&q;v1.answers-for-children-math.item2.text&q;:&q;Для занять необхідно використовувати комп’ютер (або ноутбук) з робочою вебкамерою, мікрофоном або гарнітурою. Телефон і планшет не підходять.&q;,&q;v1.answers-for-children-math.item2.title&q;:&q;На якому пристрої краще займатися?&q;,&q;v1.answers-for-children-math.item3.text&q;:&q;Усі викладачі мають педадогічну освіту у вищих навчальних закладах. Також викладачі завжди працюють над удосконаленням своїх професійних знань та навичок&q;,&q;v1.answers-for-children-math.item3.title&q;:&q;Хто наші викладачі?&q;,&q;v1.answers-for-children-math.item4.text&q;:&q;Усі завдання створені на базі рекомендацій Міністерства освіти і науки України. Проте ми використовуємо лише авторські, унікальні завдання та задачі від сертифікованих фахівців, які мають великий досвід у викладанні математики, а також створення навчальних програм.&q;,&q;v1.answers-for-children-math.item4.title&q;:&q;Яка в нас методика викладання?&q;,&q;v1.answers-for-children-math.item5.text&q;:&q;Так, можна бути присутнім, але тільки як спостерігач. Ми дуже просимо батьків довіритися нашим викладачам і дозволити навчальному процесу йти за наміченою програмою. А батьки можуть читати коментарі з оцінками про кожен урок.&q;,&q;v1.answers-for-children-math.item5.title&q;:&q;Чи можна батькам бути присутніми під час уроків?&q;,&q;v1.answers-for-children-math.item6.text&q;:&q;Програма спеціально розроблена для школярів 1-11 класів.&q;,&q;v1.answers-for-children-math.item6.title&q;:&q;Чи є обмеження за рівнем знань і віку?&q;,&q;v1.answers-for-children-programming.item1.text&q;:&q;На пробному занятті ви зможете оцінити формат подальшого навчання, ми підберемо оптимальний напрямок навчання, а студент створить свій перший мініпроєкт&q;,&q;v1.answers-for-children-programming.item1.title&q;:&q;Як проходить пробне заняття?&q;,&q;v1.answers-for-children-programming.item2.text&q;:&q;Ні, досвід мати необов’язково! Наша програма розрахована як на тих, хто вже мав невеликий досвід у програмуванні, так і на новачків у цій справі!&q;,&q;v1.answers-for-children-programming.item2.title&q;:&q;Чи потрібно мати досвід у програмуванні перед навчанням?&q;,&q;v1.answers-for-children-programming.item3.text&q;:&q;1 курс триває 1 навчальний рік (8-9 місяців), заняття проходять раз на тиждень + практичні завдання на інтерактивній платформі&q;,&q;v1.answers-for-children-programming.item3.title&q;:&q;Як довго студенту треба навчатися?&q;,&q;v1.answers-for-children-ukrainian.item1.text&q;:&q;Уроки проходять в особистому кабінеті, через сайт. Це індивідуальні заняття з викладачем у реальному часі. У кабінеті вбудована платформа, де дитина не тільки спілкується, а й виконує інтерактивні завдання. Залежно від віку й мети занять завдання в ігровій або інтерактивній формі.&q;,&q;v1.answers-for-children-ukrainian.item1.title&q;:&q;Як проходить навчання?&q;,&q;v1.answers-for-children-ukrainian.item2.text&q;:&q;Для занять необхідно використовувати комп’ютер (або ноутбук) з робочою вебкамерою, мікрофоном або гарнітурою. Телефон і планшет не підходять.&q;,&q;v1.answers-for-children-ukrainian.item2.title&q;:&q;На якому пристрої краще займатися?&q;,&q;v1.answers-for-children-ukrainian.item3.text&q;:&q;Усі викладачі мають лінгвістичну або педагогічну освіту, досвід з підготовки до ЗНО, сертифікати з власними балами. Також викладачі проходять курс дитячої психології, відповідно, можуть знайти підхід і зацікавити навчанням дітей з різним рівнем уваги, посидючості.&q;,&q;v1.answers-for-children-ukrainian.item3.title&q;:&q;Хто наші викладачі?&q;,&q;v1.answers-for-children-ukrainian.item4.text&q;:&q;Ми використовуємо як традиційні методи викладання української мови, так і робимо акцент на компетентнісному, соціокультурному, комунікативно-діяльнісному та дослідницькому підходах. Рідну мову теж можна вивчати через практику, цікаве спілкування й дослідження живого мовлення, яке ми творимо тут і разом.&q;,&q;v1.answers-for-children-ukrainian.item4.title&q;:&q;Яка в нас методика викладання?&q;,&q;v1.answers-for-children-ukrainian.item5.text&q;:&q;Так, можна бути присутнім, але тільки як спостерігач. Ми дуже просимо батьків довіритися нашим викладачам і дозволити навчальному процесу йти за наміченою програмою. А батьки можуть читати коментарі з оцінками про кожен урок.&q;,&q;v1.answers-for-children-ukrainian.item5.title&q;:&q;Чи можна батькам бути присутніми під час уроків?&q;,&q;v1.answers-for-children-ukrainian.item6.text&q;:&q;Ми вже розробили програми для 5-11 класів, але плануємо розвиватись та створити програму й для молодшої школи.&q;,&q;v1.answers-for-children-ukrainian.item6.title&q;:&q;Чи є обмеження за рівнем знань мови і віку?&q;,&q;v1.best-teachers.item1.description&q;:&q;Вчитель математики (12 років)&q;,&q;v1.best-teachers.item1.name&q;:&q;Ірина&q;,&q;v1.best-teachers.item2.description&q;:&q;Вчитель польської (15 років)&q;,&q;v1.best-teachers.item2.name&q;:&q;Майя&q;,&q;v1.best-teachers.item3.description&q;:&q;Вчитель англійської (10 років)&q;,&q;v1.best-teachers.item3.name&q;:&q;Софія&q;,&q;v1.best-teachers.item4.description&q;:&q;Вчитель математики (8 років)&q;,&q;v1.best-teachers.item4.name&q;:&q;Олексій&q;,&q;v1.best-teachers.title&q;:&q;Найкращі вчителі 2022 року&q;,&q;v1.english-ad.form.main.title&q;:&q;Залиш дані, щоб ми могли з тобою звʼязатися&q;,&q;v1.english-ad.form.radio-item1&q;:&q;Для дитини&q;,&q;v1.english-ad.form.radio-item2&q;:&q;Для себе&q;,&q;v1.english-ad.form.submit-button.title&q;:&q;Спробувати безкоштовно&q;,&q;v1.english-ad.main-banner.item1&q;:&q;Безкоштовно&q;,&q;v1.english-ad.main-banner.item2&q;:&q;з 7:00 до 23:00&q;,&q;v1.english-ad.main-banner.item3&q;:&q;Можеш обрати &q;,&q;v1.english-ad.main-banner.item4&q;:&q;native speaker&q;,&q;v1.english-ad.main-banner.item5&q;:&q;&l;strong&g;+2 уроки&l;/strong&g; по промокоду \&q;{currentMonth}\&q; безкоштовно * &q;,&q;v1.english-ad.main-banner.item6&q;:&q;по промокоду \&q;April\&q; безкоштовно *&q;,&q;v1.english-ad.main-banner.title&q;:&q;Запишись на свій перший пробний урок&q;,&q;v1.english-for-adults.header.description&q;:&q;Курси англійської мови для дорослих в онлайн-школі JustSchool ⭐ Англійська з нуля для дорослих-початківців ✔️ Гарантований результат ✔️ Ефективна програма&q;,&q;v1.english-for-adults.header.title&q;:&q;Англійська для дорослих - курси англійської для дорослих - JustSchool&q;,&q;v1.english-for-adults-page.action&q;:&q;Спробувати безкоштовно&q;,&q;v1.english-for-adults-page.main-banner.description&q;:&q;Індивідуальні заняття на платформі з викладачем, не виходячи з дому&q;,&q;v1.english-for-adults-page.main-banner.item1&q;:&q;Більше 650 вчителів англійської&q;,&q;v1.english-for-adults-page.main-banner.item2&q;:&q;8500 задоволених учнів&q;,&q;v1.english-for-adults-page.main-banner.title&q;:&q;Онлайн-курси англійської мови для дорослих&q;,&q;v1.english-for-adults-page.method1&q;:&q;Фокусуємося на ваших цілях. Розмовна англійська + Бізнес + Подорожі + Життя за кордоном&q;,&q;v1.english-for-adults-page.method2&q;:&q;Комунікативний підхід. Спілкуйся англійською з першого уроку незалежно від рівня&q;,&q;v1.english-for-adults-page.method3&q;:&q;Наші матеріали створені на основі провідних світових практик&q;,&q;v1.english-for-adults-page.our-teacher.description1&q;:&q;Окрім тестування на знання англійської, також навчаються працювати на платформі та проходять курси з роботи з різними дітьми та навчаються знаходити індивідуальний підхід&q;,&q;v1.english-for-adults-page.our-teacher.description2&q;:&q;Для викладачів існує підтримка провідного методиста школи та постійне оновлення курсів навчання з підвищення кваліфікації&q;,&q;v1.english-for-adults-page.our-teacher.description3&q;:&q;Наші викладачі мають дипломи педагогічних та лінгвістичних вузів, а також постійно навчаються та отримують міжнародні сертифікати CELTA, DELTA або TEFL&q;,&q;v1.english-for-adults-page.our-teacher.description4&q;:&q;Крім занять із локальними вчителями, у вас є опція займатися з викладачами англомовних країн&q;,&q;v1.english-for-adults-page.our-teacher.title1&q;:&q;Довірте англійську експертам&q;,&q;v1.english-for-adults-page.our-teacher.title2&q;:&q;Методична підтримка&q;,&q;v1.english-for-adults-page.our-teacher.title3&q;:&q;Освіта&q;,&q;v1.english-for-adults-page.our-teacher.title4&q;:&q;Native Speakers&q;,&q;v1.english-for-child.any-age.children.age&q;:&q;(6-12 років)&q;,&q;v1.english-for-child.any-age.children.item1&q;:&q;Підготуємо до школи&q;,&q;v1.english-for-child.any-age.children.item2&q;:&q;Сформуємо звичку до навчання&q;,&q;v1.english-for-child.any-age.children.item3&q;:&q;Зробимо мову рідною&q;,&q;v1.english-for-child.any-age.children.item4&q;:&q;Навчимо через гру&q;,&q;v1.english-for-child.any-age.children.title&q;:&q;Дітям&q;,&q;v1.english-for-child.any-age.teenagers.age&q;:&q;(12-17 років)&q;,&q;v1.english-for-child.any-age.teenagers.item1&q;:&q;Підтягнемо шкільний рівень&q;,&q;v1.english-for-child.any-age.teenagers.item2&q;:&q;Підготуємо до ЗНО&q;,&q;v1.english-for-child.any-age.teenagers.item3&q;:&q;Навчимо говорити&q;,&q;v1.english-for-child.any-age.teenagers.item4&q;:&q;Проконтролюємо результати&q;,&q;v1.english-for-child.any-age.teenagers.title вня ✔️ Гарантований результат ✔️ Сертифіковані викладачі&q;,&q;v1.main-page.header.title&q;:&q;Школа англійської мови - англійська онлайн - JustSchool&q;,&q;v1.main-page.main-banner.action&q;:&q;Спробувати безкоштовно&q;,&q;v1.main-page.main-banner.item1&q;:&q;Індивідуальні та групові заняття з викладачем&q;,&q;v1.main-page.main-banner.item2&q;:&q;Для дорослих та дітей&q;,&q;v1.main-page.main-banner.item3&q;:&q;На інтерактивній платформі&q;,&q;v1.main-page.main-banner.title&q;:&q;Онлайн-школа&q;,&q;v1.main-page.reviews.item-text1&q;:&q;Доброго дня! Мій син займається у школі майже рік . Ми дуже задоволені якістю навчання та послуги загалом . Все вчасно , якісно і завжди так , як зручно нам . Дякуємо школі за наші знання.&q;,&q;v1.main-page.reviews.item-text2&q;:&q;Дитина (10 років, рівень – початковий) у захваті! Рекомендую!&q;,&q;v1.main-page.reviews.item-text3&q;:&q;Доброго дня однозначно раджу онлайн школу «JustSchool”. Кваліфіковані фахівці, відмінна платформа, дуже подобається методика та доступність викладання. Дитина займається третій рік, хороші результати, а головне з інтересом готується і з нетерпінням чекає на наступний урок з викладачем Анною. Дуже комунікабельні менеджери завжди допоможуть вирішити будь-яке питання.&q;,&q;v1.main-page.reviews.item-text4&q;:&q;Добридень! Школу JustSchool рекомендую, тому що це дуже зручно займатися онлайн! Викладача можна підбирати індивідуально для своєї дитини, що теж важливо для якісного навчання! Наша дитина дуже задоволена навчанням, займається вже близько 3-3.5 років, все подобається і є результат!&q;,&q;v1.main-page.reviews.title&q;:&q;Відгуки&q;,&q;v1.main-page.teachers.action&q;:&q;Дізнатися більше&q;,&q;v1.main-page.teachers.description&q;:&q;Наші вчителі - це енергійні люди з педагогічним досвідом і жагою до нового. Тому для кожного учня, і дорослого, і малого, буде знайдено індивідуальний підхід&q;,&q;v1.main-page.teachers.item1.description&q;:&q;Вчителів&q;,&q;v1.main-page.teachers.item1.title&q;:&q;650+&q;, y.item.text1&q;:&q;Діти навчаються через інтерактивні завдання та поринають у цікавий світ математики&q;,&q;v1.math.why.item.text2&q;:&q;Ми працюємо з тими ж темами шкільної програми, але робимо це значно цікавіше&q;,&q;v1.math.why.item.text3&q;:&q;Усе навчання онлайн, необхідні тільки комп&s;ютер та інтернет&q;,&q;v1.math.why.item.text4&q;:&q;Покращуємо шкільні оцінки та готуємо до успішної здачі іспитів&q;,&q;v1.math.why.item.title1&q;:&q;Інноваційно&q;,&q;v1.math.why.item.title2&q;:&q;Цікаво&q;,&q;v1.math.why.item.title3&q;:&q;Зручно&q;,&q;v1.math.why.item.title4&q;:&q;Результативно&q;,&q;v1.math.why.title&q;:&q;Чому варто вивчати математику з JustSchool?&q;,&q;v1.method.title&q;:&q;Методика&q;,&q;v1.polish-for-adults-page.main-banner.description&q;:&q;Індивідуальні та групові заняття на платформі з викладачем, не виходячи з дому&q;,&q;v1.polish-for-adults-page.main-banner.title&q;:&q;Онлайн-уроки польської мови для дорослих&q;,&q;v1.polish-for-adults-page.method1&q;:&q;Прикладний формат: студенти вивчають мову в процесі симуляції реальних практичних ситуацій, а тому навчання не відірване від життя, а викладач враховує реалії польської мови.&q;,&q;v1.polish-for-adults-page.method2&q;:&q;Комунікативна методика: основа занять - комунікація, а не абстрактне виконання граматичних завдань.&q;,&q;v1.polish-for-adults-page.method3&q;:&q;Партнерський підхід: вчитель виступає партнером студента, навчання відбувається в процесі взаємного обміну.&q;,&q;v1.polish-for-adults-page.method4&q;:&q;Візуалізація та аудіосупровід: матеріали є максимально візуалізованими для полегшення сприйняття та запам&s;ятовування, слова та фрази супроводжуються озвучкою, а уроки - цікавими практичними діалогами для тренування вимови та сприйняття на слух.&q;,&q;v1.polish-for-adults-page.our-teacher.description2&q;:&q;Для викладачів існує підтримка провідного методиста школи та постійне оновлення курсів навчання з підвищення кваліфікації&q;,&q;v1.polish-for-adults-page.our-teacher.description3&q;:&q;Наші викладачі мають дипломи педагогічних та лінгвістичних вузів, а також постійно навчаються та отримують нові знання, що робить заняття більш сучасними&q;,&q;v1.polish-for-adults-page.our-teacher.description4&q;:&q;Наші викладачі не тільки допоможуть вивчити нове, а також допоможуть систематизувати знання&q;,&q;v1.polish-for-adults-page.our-teacher.title2&q;:&q;Методична підтримка&q;,&q;v1.polish-for-adults-page.our-teacher.title3&q;:&q;Освіта&q;,&q;v1.polish-for-adults-page.our-teacher.title4&q;:&q;Індивідуальний підхід&q;,&q;v1.polish-for-children.header.description&q;:&q;Курси польської мови для дітей у JustSchool ⭐ Польська для дітей онлайн ✔️ Гарантований результат ✔️ Сертифіковані викладачі &q;,&q;v1.polish-for-children.header.title&q;:&q;Польська мова для дітей онлайн - курси польської для дітей - JustSchool&q;,&q;v1.polish-for-children-page.main-banner.title&q;:&q;Онлайн-уроки польської мови для дітей&q;,&q;v1.polish-for-children-page.method1&q;:&q;Ігровий формат: цікаві персонажі та їхня історія допомагають тримати увагу дітей протягом уроку та чекати продовження уроку&q;,&q;v1.polish-for-children-page.method2&q;:&q;Інтерактивна методика: усі завдання є максимально інтерактивними, залучають дитину до дії та активної участі у занятті.&q;,&q;v1.polish-for-children-page.method3&q;:&q;Корисні перерви: цікавий та корисний матеріал про Польщу, пісні, відео - чудовий спосіб перепочити від граматичних вправ і провести час із користю для себе&q;,&q;v1.polish-for-children-page.method4&q;:&q;Приємний спосіб зворотного зв&s;язку: контроль - невід&s;ємна частина навчання. Ми маємо зручну форму фідбеку, а також можливість отримати рекомендації, поради від вчителя та цікаве домашнє завдання&q;,&q;v1.products.english.header.item1&q;:&q;Англійська для дітей&q;,&q;v1.products.english.header.item2&q;:&q;Англійська для дорослих&q;,&q;v1.products.english.header.item3&q;:&q;Англійська для компаній&q;,&q;v1.products.english.header.item4&q;:&q;Англійська для підлітків &q;,&q;v1.products.english.item1&q;:&q;Для дітей&q;,&q;v1.products.english.item2&q;:&q;Для дорослих&q;,&q;v1.products.english.item3&q;:&q;Для компаній&q;,&q;v1.products.english.item4&q;:&q;Для підлітків&q;,&q;v1.products.english.title&q;:&q;Англійська мова&q;,&q;v1.products.german.header.item1&q;:&q;Німецька мова для дорослих&q;,&q;v1.products.german.header.item2&q;:&q;Німецька мова для дітей&q;,&q;v1.products.german.item1&q;:&q;Для дітей&q;,&q;v1.products.german.item2&q;:&q;Для дорослих&q;,&q;v1.products.german.title&q;:&q;Німецька мова&q;,&q;v1.products.math.header.item2&q;:&q;Математика для дітей&q;,&q;v1.products.math.item1&q;:&q;Підготовка до школи&q;,&q;v1.products.math.item2&q;:&q;Для учнів 1-11 класів&q;,&q;v1.products.math.title&q;:&q;Математика&q;,&q;v1.products.polish.header.item1&q;:&q;Польська мова для дітей&q;,&q;v1.products.polish.header.item2&q;:&q;Польська мова для дорослих&q;,&q;v1.products.polish.item1&q;:&q;Для дітей&q;,&q;v1.products.polish.item2&q;:&q;Для дорослих&q;,&q;v1.products.polish.title&q;:&q;Польська мова&q;,&q;v1.products.programming.header.item1&q;:&q;Програмування для дітей&q;,&q;v1.products.programming.header.item2&q;:&q;Програмування для підлітків&q;,&q;v1.products.programming.item1&q;:&q;Для дітей&q;,&q;v1.products.programming.item2&q;:&q;Для підлітків&q;,&q;v1.products.programming.title&q;:&q;Програмування&q;,&q;v1.products.title&q;:&q;Ми пропонуємо навчання&q;,&q;v1.products.ukrainian.header.item1&q;:&q;Українська мова для учнів 5-11 класів&q;,&q;v1.products.ukrainian.header.item2&q;:&q;Українська мова підготовка до ЗНО&q;,&q;v1.products.ukrainian.item1&q;:&q;Для учнів 5-11 класів&q;,&q;v1.products.ukrainian.item2&q;:&q;Підготовка до ЗНО&q;,&q;v1.products.ukrainian.title&q;:&q;Українська мова&q;,&q;v1.programming-for-children.header.description&q;:&q;Курси програмування для дітей у JustSchool ⭐ Програмування для дітей онлайн ✔️ Гарантований результат ✔️ Сертифіковані викладачі &q;,&q;v1.programming-for-children.header.title&q;:&q;Програмування для дітей онлайн - курси програмування для дітей - JustSchool&q;,&q;v1.programming-for-children.lesson-flow.item1&q;:&q;Повторення пройденого матеріалу&q;,&q;v1.programming-for-children.lesson-flow.item2&q;:&q;Вступна лекція&q;,&q;v1.programming-for-children.lesson-flow.item3&q;:&q;Основна частина&q;,&q;v1.programming-for-children.lesson-flow.item4&q;:&q;Практика&q;,&q;v1.programming-for-children.lesson-flow.title&q;:&q;Як проходять заняття&q;,&q;v1.programming-for-children-page.action&q;:&q;Спробувати безкоштовно&q;,&q;v1.programming-for-children-page.main-banner.item1&q;:&q;Групові заняття для студентів 8-17 років&q;,&q;v1.programming-for-children-page.main-banner.item2&q;:&q;Навчимо програмувати з 0 або поглибимо попередній досвід&q;,&q;v1.programming-for-children-page.main-banner.item3&q;:&q;Допоможемо визначитись з майбутньою професією&q;,&q;v1.programming-for-children-page.main-banner.title&q;:&q;Онлайн-уроки з програмування&q;,&q;v1.programming.programming-choose-course.action&q;:&q;Спробувати безкоштовно&q;,&q;v1.programming.programming-choose-course.description&q;:&q;Запишіться на пробне заняття, і ми Вам допоможемо&q;,&q;v1.programming.programming-choose-course.title&q;:&q;Не знаєте який курс обрати? &q;,&q;v1.programming.programming-courses.age&q;:&q;Вік студентів:&q;,&q;v1.programming.programming-courses.item1.age&q;:&q;8-10 років&q;,&q;v1.programming.programming-courses.item1.text&q;:&q;Вивчимо основи програмування, створимо власні програми та ігри у візуальному середовищі Scratch, основа якого - блоки, подібні конструктору Legо&q;,&q;v1.programming.programming-courses.item1.title&q;:&q;Scratch&q;,&q;v1.programming.programming-courses.item2.age&q;:&q;10-12 років&q;,&q;v1.programming.programming-courses.item2.text&q;:&q;На всесвітньо відомій платформі допоможемо зрозуміти основи написання кодів мовою Lua шляхом створення власних 3D ігор. Це важливий перший крок для майбутніх розробників&q;,&q;v1.programming.programming-courses.item2.title&q;:&q;Roblox&q;,&q;v1.programming.programming-courses.item3.age&q;:&q;13+&q;,&q;v1.programming.programming-courses.item3.text&q;:&q;Навчимось кодити однією з найпопулярніших мов програмування у світі - Python - і закладемо фундамент майбутнього програміста, створивши ряд ігор та проєктів&q;,&q;v1.programming.programming-courses.item3.title&q;:&q;Python&q;,&q;v1.programming.programming-courses.item4.age&q;:&q;13+&q;,&q;v1.programming.programming-courses.item4.text&q;:&q;Опануємо мистецтво створення сайтів з використанням HTML + CSS. У фіналі курсу розробимо свій сайт з нуля та опублікуємо його в мережі&q;,&q;v1.programming.programming-courses.item4.title&q;:&q;Web-програмування&q;,&q;v1.programming.programming-courses.register&q;:&q;Записатися на курс&q;,&q;v1.programming.programming-courses.title&q;:&q;Наші курси:&q;,&q;v1.programming.why.item.text1&q;:&q;На кожному курсі створюємо збірку власних проєктів: ігор, web-сайтів, програм&q;,&q;v1.programming.why.item.text2&q;:&q;комунікація,\nкреатив, командна робота, креативне мислення&q;,&q;v1.programming.why.item.text3&q;:&q;Усе навчання онлайн, потрібен тільки комп&s;ютер та інтернет. Завжди є зворотний зв’язок від викладача&q;,&q;v1.programming.why.item.text4&q;:&q;70% уроку - практика без сухої теорії із якісною системою повторення та закріплення знань&q;,&q;v1.programming.why.item.title1&q;:&q;Результат&q;,&q;v1.programming.why.item.title2&q;:&q;Розвиток навичок 4К&q;,&q;v1.programming.why.item.title3&q;:&q;Контроль навчання&q;,&q;v1.programming.why.item.title4&q;:&q;Ефективність&q;,&q;v1.programming.why.title&q;:&q;Чому вивчати програмування з JustSchool цікаво?&q;,&q;v1.teachers-page.main-banner.action&q;:&q;Записатися на пробне заняття&q;,&q;v1.teachers-page.main-banner.item1&q;:&q;Більше 2 000 вчителів на платформі&q;,&q;v1.teachers-page.main-banner.item2&q;:&q;Середній стаж вчителя 8 років&q;,&q;v1.teachers-page.main-banner.title&q;:&q;Вчителі&q;,&q;v1.teachers-selection.item1.content&q;:&q;Крім тестування на знання предмету, також навчаються працювати на платформі та проходять курси по роботі з різними дітьми та навчаються знаходити індивідуальний підхід&q;,&q;v1.teachers-selection.item1.title&q;:&q;Декілька етапів відбору викладачів&q;,&q;v1.teachers-selection.item2.content&q;:&q;У наших викладачів є дипломи філологічних та лінгвістичних вузів,\nа також вони постійно навчаються та отримують міжнародні сертифікати&q;,&q;v1.teachers-selection.item2.title&q;:&q;Освіта&q;,&q;v1.teachers-selection.item3.content&q;:&q;Окрім локальних вчителів у вас є опція займатися з викладачами з тієї країни, мову якої ви вивчаєте&q;,&q;v1.teachers-selection.item3.title&q;:&q;Носії мови&q;,&q;v1.teachers-selection.item4.content&q;:&q;Для викладачів існує підтримка провідного методиста школи та постійне оновлення курсів щодо підвищення кваліфікації&q;,&q;v1.teachers-selection.item4.title&q;:&q;Методична підтримка&q;,&q;v1.teachers-selection.title&q;:&q;Як ми обираємо вчителів&q;,&q;v1.thank-you-page.main-banner.action.telegram&q;:&q;Telegram&q;,&q;v1.thank-you-page.main-banner.action.viber&q;:&q;Viber&q;,&q;v1.thank-you-page.main-banner.title&q;:&q;Для завершення реєстрації підпишіться на наш месенджер&q;,&q;v1.ukrainian-for-children.header.description&q;:&q;Курси української мови для дітей у JustSchool ⭐ Українська мова для дітей онлайн ✔️ Гарантований результат ✔️ Сертифіковані викладачі &q;,&q;v1.ukrainian-for-children.header.title&q;:&q;Українська мова для дітей онлайн - курси української мови для дітей - JustSchool&q;,&q;v1.ukrainian-for-children-page.main-banner.title&q;:&q;Онлайн-уроки української мови для школярів&q;,&q;v1.ukrainian-for-children.school-pluses.item1.title&q;:&q;Теорія в таблицях та схемах&q;,&q;v1.ukrainian-for-children.school-pluses.item2.title&q;:&q;Зручна та яскрава платформа&q;,&q;v1.ukrainian-for-children.school-pluses.item3.title&q;:&q;Сучасні вправи й тексти (без журби чи кріпаків)&q;,&q;v1.ukrainian-for-children.school-pluses.item4.title&q;:&q;Цікаві дискусії з мовних та навколомовних питань&q;,&q;v1.ukrainian-for-children.school-pluses.item5.title&q;:&q;Підготовка до контрольних/іспитів/ДПА/ЗНО/НМТ&q;,&q;v1.ukrainian-for-children.will-teach.item1&q;:&q;Наш курс української мови побудований на грамотному підході&q;,&q;v1.ukrainian-for-children.will-teach.item2&q;:&q;Ви не тільки дізнаєтеся цікаве ПРО мову, але й навчитеся віртуозно КОРИСТУВАТИСЯ нею, передусім розвиваючи навички та вміння&q;,&q;v1.ukrainian-for-children.will-teach.item3&q;:&q;У нас немає громіздких текстів, уся теорія подана в живому спілкуванні з візуальними матеріалами (таблицями, схемами, мапами думок)&q;,&q;v1.ukrainian-for-children.will-teach.item4&q;:&q;На наших уроках кожне правило одразу ж закріплюється практикою&q;,&q;v1.ukrainian-for-children.will-teach.title&q;:&q;Як побудований курс?&q;,&q;v1.ukrainian.why.item.text1&q;:&q;Діти навчаються через інтерактивні завдання та поринають у цікавий світ мови&q;,&q;v1.ukrainian.why.title&q;:&q;Чому вчити українську з JustSchool цікаво?&q;,&q;v1.english-for-child.any-age.preschoolers.title&q;:&q;Дошкільнятам&q;,&q;v1.english-for-child.any-age.preschoolers.age&q;:&q;(4–5 років)&q;,&q;v1.english-for-child.any-age.preschoolers.item1&q;:&q;Підготуємо до школи&q;,&q;v1.english-for-child.any-age.preschoolers.item2&q;:&q;Сформуємо навичку навчання через гру&q;,&q;v1.english-for-child.any-age.preschoolers.item3&q;:&q;Закладемо фундамент для вивчення іноземних мов у майбутньому&q;,&q;v1.english-for-child.any-age.preschoolers.item4&q;:&q;Розкриємо творчі здібності&q;,&q;form.sms-verify.submit.wrong-code.error&q;:&q;Перевірте правильність вводу коду&q;,&q;form.sms-verify.submit.some.error&q;:&q;Щось пішло не так, будь ласка, спробуйте ще раз!&q;,&q;form.get-sms-code.submit.error&q;:&q;Щось пішло не так, будь ласка, спробуйте ще раз!&q;,&q;form.get-sms-code.submitted&q;:&q;Код відправлено!&q;,&q;confirm-sms.modal.title&q;:&q;Підтвердження номеру телефону&q;,&q;confirm-sms.modal.subtitle&q;:&q;На номер {phone} було відправлено код підтвердження. У випадку якщо код не прийшов, ви можете запросити його повторно&q;,&q;confirm-sms.modal.field.placeholder&q;:&q;Код&q;,&q;confirm-sms.modal.button.continue&q;:&q;Продовжити&q;,&q;confirm-sms.modal.button.send-again&q;:&q;Отримати новий код&q;,&q;confirm-sms.modal.button.send-again-after#time&q;:&q;Отримати новий код через {time} сек.&q;,&q;form.get-sms-code.try-later&q;:&q;Будь ласка, спробуйте ще раз через кілька хвилин!&q;,&q;v1.landing-eng-adult.main-banner.title&q;:&q;Онлайн-уроки англійської мови для дорослих&q;,&q;v1.landing-eng-adult.main-banner.description&q;:&q;Індивідуальні та групові заняття на платформі з викладачем, не виходячи з дому&q;,&q;v1.landing-eng-adult.method.title&q;:&q;Методика&q;,&q;v1.landing-eng-adult.method1.title&q;:&q;Фокусуємося на ваших цілях&q;,&q;v1.landing-eng-adult.method2.title&q;:&q;Комунікативний підхід&q;,&q;v1.landing-eng-adult.method2.description&q;:&q;Спілкуйся англійською з першого уроку незалежно від рівня&q;,&q;v1.landing-eng-adult.method3.title&q;:&q;Якісні матеріали&q;,&q;v1.landing-eng-adult.method3.description&q;:&q;Наші матеріали створені на основі провідних світових практик&q;,&q;v1.landing-eng-adult.experts.title&q;:&q;Довірте навчання експертам&q;,&q;v1.landing-eng-adult.experts.description&q;:&q;Наші вчителі - це енергійні люди з педагогічним досвідом і жагою до нового. Тому для кожного учня, і дорослого, і малого, буде знайдено індивідуальний підхід&q;,&q;v1.landing-eng-adult.method1.description_speaking&q;:&q;Розмовна англійська&q;,&q;v1.landing-eng-adult.method1.description_business&q;:&q;Бізнес&q;,&q;v1.landing-eng-adult.method1.description_travel&q;:&q;Подорожі&q;,&q;v1.landing-eng-adult.method1.description_abroad&q;:&q;Життя за кордоном&q;,&q;v1.landing-eng-adult.experts.item1.title&q;:&q;800+&q;,&q;v1.landing-eng-adult.experts.item1.text&q;:&q;Вчителів викладають у нас&q;,&q;v1.landing-eng-adult.experts.item2.title&q;:&q;1/89&q;,&q;v1.landing-eng-adult.experts.item2.text&q;:&q;Проходять наш відбір&q;,&q;v1.landing-eng-adult.experts.item3.title&q;:&q;5 років&q;,&q;v1.landing-eng-adult.experts.item3.text&q;:&q;Середній стаж вчителів&q;,&q;v1.landing-eng-children.main-banner.title&q;:&q;Онлайн-уроки англійської мови для дітей&q;,&q;v1.landing-eng-children.main-banner.description&q;:&q;Індивідуальні та групові заняття на платформі з викладачем, не виходячи з дому&q;,&q;v1.landing-eng-child.about1.title&q;:&q;Відеочат з викладачем&q;,&q;v1.landing-eng-child.about2.title&q;:&q;Навчальні матеріали в одному місці&q;,&q;v1.landing-eng-child.about3.title&q;:&q;Доступ до цікавих відео, статей та ігор&q;,&q;v1.landing-eng-child.about1.text&q;:&q;Спілкуйтеся англійською, викладач завжди вам допоможе, якщо у вас виникнуть складнощі&q;,&q;v1.landing-eng-child.about2.text&q;:&q;Всі навчальні матеріали наших курсів зібрані на одній зручній платформі&q;,&q;v1.landing-eng-child.about3.text&q;:&q;Наші методики роблять заняття цікавішими з цікавими матеріалами&q;,&q;v1.landing-eng-child.age1.subtitle&q;:&q;Дітям (6-12 років)&q;,&q;v1.landing-eng-adult.age1.item1&q;:&q;Підготуємо до школи&q;,&q;v1.landing-eng-adult.age1.item2&q;:&q;Сформуємо звичку до навчання&q;,&q;v1.landing-eng-adult.age1.item3&q;:&q;Зробимо мову рідною&q;,&q;v1.landing-eng-adult.age1.item4&q;:&q;Навчимо через гру&q;,&q;v1.landing-eng-child.age.title&q;:&q;Для дитини будь-якого віку&q;,&q;v1.landing-eng-child.age2.subtitle&q;:&q;Підліткам (12-17 років)&q;,&q;v1.landing-eng-adult.age2.item1&q;:&q;Підтягнемо шкільний рівень&q;,&q;v1.landing-eng-adult.age2.item2&q;:&q;Підготуємо до ЗНО&q;,&q;v1.landing-eng-adult.age2.item3&q;:&q;Навчимо говорити&q;,&q;v1.landing-eng-adult.age2.item4&q;:&q;Проконтролюємо результати&q;,&q;v1.error.name&q;:&q;Латиниця, кирилиця та символи «ʼ»,«-»&q;,&q;v1.error.length2to100&q;:&q;Від 2 до 100 символів&q;,&q;v1.error.length5to100&q;:&q;Від 5 до 100 символів&q;,&q;v1.error.min-length#required&q;:&q;Значення поля повинно бути не менше {required } символів&q;,&q;v1.error.digitsOnly&q;:&q;Тільки цифри&q;,&q;confirm-sms.modal.4-digit-code&q;:&q;Введіть чотиризначний код&q;,&q;v1.header.blog&q;:&q;Блог&q;,&q;v1.thank-you-page.fb.title&q;:&q;Дякуємо, що обрали нашу школу&q;,&q;v1.thank-you-page.fb.text&q;:&q;За декілька секунд ми автоматично направимо вас\nдо особистого кабінету&q;,&q;v1.english-ad-speaking-club.main-banner.item1&q;:&q;&l;strong&g;+3 місяці&l;/strong&g; доступу до безкоштовних розмовних клубів, за умови купівлі курсу без пробного уроку *&q;,&q;v1.english-ad-speaking-club.footnote&q;:&q;* За першої оплати будь-якого пакета від 8-ми уроків.&q;,&q;v1.english-ad.footnote&q;:&q;* Скориставшись промокодом Ви отримаєте +2 уроки за першої оплати будь-якого пакета від 8-ми уроків.&q;,&q;v2.faqs.header.title&q;:&q;Часті запитання | Курси англійської мови JustSchool&q;,&q;v2.faqs.header.description&q;:&q;Поширені запитання (FAQ) Відповіді на більшість ваших запитань про курси англійської мови в онлайн-школі. Дізнайтеся більше про навчання в JustSchool.&q;,&q;v2.faqs.all-questions&q;:&q;Всі запитання&q;,&q;v2.faqs.back&q;:&q;Назад до всіх питань&q;,&q;v2.faqs.contact-us&q;:&q;Зв’яжіться з нами&q;,&q;v2.faqs.glad-to-help&q;:&q;Будемо раді допомогти!&q;,&q;v2.faqs.no-answer&q;:&q;Не знайшли відповіді на своє питання?&q;,&q;v2.faqs.no-results.text&q;:&q;Спробуйте пошукати питання з іншими ключовими словами&q;,&q;v2.faqs.no-results.title&q;:&q;На жаль, ми не знайшли твого питання :(&q;,&q;v2.faqs.payment.question-1.answer&q;:&q;У нашій школі ви можете придбати пакет занять від 4 до 240 уроків. І що більше уроків, то більша економія. А ще в нас діє гнучка система бонусів, тому щоб дізнатися точну ціну, зверніться до менеджера за телефоном 080 033 97 42 або через &l;a href=\&q;https://t.me/JustKidsBot\&q; target=\&q;_blank\&q;&g;чат-бот&l;/a&g;.&q;,&q;v2.faqs.payment.question-1.title&q;:&q;Скільки коштує навчання в JustSchool?&q;,&q;v2.faqs.payment.question-2.answer&q;:&q;У нашій школі оплатити навчання можна через сайт в особистому кабінеті (розділ «Оплатити»), через Приват24 і створення нового платежу, готівкою через термінал ПриватБанку, а також через чат-бот (там є кнопка «Оплатити»).&q;,&q;v2.faqs.payment.question-2.title&q;:&q;Які є способи оплати навчання в JustSchool?&q;,&q;v2.faqs.payment.question-3.answer&q;:&q;Якщо ви повідомили нашим менеджерам про скасування заняття не менше, ніж за 1 годину до його початку, то цей урок залишиться на вашому балансі. Скасувати заняття можна в особистому кабінеті. Але якщо ви пропустили груповий урок, то ми, на жаль, не можемо повернути його на ваш баланс, бо для якісних групових занять дуже важливо, щоб усі учні регулярно відвідували уроки. \n&l;br&g;&l;br&g;\nДо того ж певні пакети занять дають змогу заморожувати уроки й продовжувати навчання пізніше. З будь-якими питаннями щодо проведення уроків можете звернутися до наших менеджерів за телефоном 080 033 97 42 або через &l;a href=\&q;https://t.me/JustKidsBot\&q; target=\&q;_blank\&q;&g;чат-бот&l;/a&g;.&q;,&q;v2.faqs.payment.question-3.title&q;:&q;Якщо я пропустив урок, чи потрібно звертатися у підтримку, щоб його повернули на мій баланс?&q;,&q;v2.faqs.payment.question-4.answer&q;:&q;У нашій школі завжди діють як постійні, так і тимчасові спеціальні пропозиції. Наприклад:\n&l;ul&g;\n&l;li&g;&l;i&g;запроси друга&l;/i&g; (якщо ви надішлете запрошення на навчання в JustSchool своїм друзям і вони пройдуть пробне заняття й придбають щонайменше 12 уроків, то ви обидва гарантовано отримаєте бонуси);&l;/li&g;\n&l;li&g;&l;i&g;оплата до пробного уроку&l;/i&g; (придбайте зручний для себе пакет від 12 уроків без проходження пробного уроку й автоматично отримайте бонус);&l;/li&g;\n&l;li&g;&l;i&g;оплата в день пробного уроку&l;/i&g; (якщо ви купуєте уроки в нашій школі в день пробного уроку, ви автоматично отримуєте бонус);&l;/li&g;\n&l;li&g;&l;i&g;соціальна допомога для дітей з особливостями розвитку&l;/i&g; (даруємо два безкоштовні уроки).&l;/li&g;\n&l;/ul&g;\n&q;,&q;v2.faqs.payment.question-4.title&q;:&q;Які спеціальні пропозиції діють у JustSchool?&q;,&q;v2.faqs.payment.question-5.answer&q;:&q;Так, у нашій школі ви можете оплатити навчання частинами через особистий кабінет і не сплачувати за це відсотки.&q;,&q;v2.faqs.payment.question-5.title&q;:&q;Чи можна оплачувати курс частинами?&q;,&q;v2.faqs.payment.question-6.answer&q;:&q;Після того як на вашому балансі закінчаться уроки, наш менеджер зв&s;яжеться з вами. А якщо у вас не буде змоги оплатити навчання відразу, ви можете попередити про це нашого менеджера й скористатися двома кредитними уроками.&q;,&q;v2.faqs.payment.question-6.title&q;:&q;Що буде, якщо сплатити невчасно?&q;,&q;v2.faqs.payment-questions&q;:&q;Оплата й спеціальні пропозиції&q;,&q;v2.faqs.search&q;:&q;Пошук&q;,&q;v2.faqs.search-results&q;:&q;Результати пошуку &q;,&q;v2.faqs.studying.question-10.answer&q;:&q;У JustSchool ви можете вчитися безпечно з будь-якого місця на Землі й не хвилюватися, що доведеться йти додому від репетитора затемна. А найголовніше, що завдяки навчанню онлайн ви постійно економите кошти й час на дорогу. Дехто за витрачений на дорогу час зміг би пройти в нас два уроки. Завдяки цим перевагам онлайн-навчання ви можете досягати своїх цілей із задоволенням та з меншими витратами будь-коли й будь-де.&q;,&q;v2.faqs.studying.question-10.title&q;:&q;Чим навчання в JustSchool краще, ніж офлайн?&q;,&q;v2.faqs.studying.question-11.answer&q;:&q;У нашій школі працює понад 1500 викладачів. Усі вони мають відповідний рівень знань та кваліфікації та зможуть ефективно допомогти вам досягти бажаних результатів у навчанні. Лише 1 з 89 викладачів проходить багаторівневий відбір та приступає до викладання в JustSchool. Окрім того, вони постійно навчаються, підвищують свій рівень кваліфікації та консультуються з провідними методистами.&q;,&q;v2.faqs.studying.question-11.title&q;:&q;Як ми обираємо викладачів?&q;,&q;v2.faqs.studying.question-12.answer&q;:&q;Якщо вчитель не доєднається до уроку протягом п&s;яти хвилин, наша система автоматично підшукає вам нового вчителя. У нашій команді працюють лише кваліфіковані та освічені вчителі, тому можете бути спокійні, що інший вчитель також проведе урок на високому рівні.\n&l;br&g;&l;br&g;\nЯкщо ви не хочете займатися з новим учителем, зверніться до нашої команди підтримки через &l;a href=\&q;https://t.me/JustKidsBot\&q; target=\&q;_blank\&q;&g;чат-бот&l;/a&g; або за номером 080 033 97 42.&q;,&q;v2.faqs.studying.question-12.title&q;:&q;Що робити, якщо викладач не прийшов на урок?&q;,&q;v2.faqs.studying.question-13.answer&q;:&q;Щоб змінити викладача, зверніться до наших менеджерів через &l;a href=\&q;https://t.me/JustKidsBot\&q; target=\&q;_blank\&q;&g;чат-бот&l;/a&g; або за телефоном 080 033 97 42. Ми з радістю підберемо вам фахівця, що допоможе вам навчатися та досягати своїх цілей із задоволенням.&q;,&q;v2.faqs.studying.question-13.title&q;:&q;Як змінити викладача?&q;,&q;v2.faqs.studying.question-14.answer&q;:&q;Графік занять (на поточний тиждень) можна переглянути в особистому кабінеті учня, а також у  &l;a href=\&q;https://t.me/JustKidsBot\&q; target=\&q;_blank\&q;&g;чат-боті&l;/a&g; в розділі «Розклад».&q;,&q;v2.faqs.studying.question-14.title&q;:&q;Як дізнатися актуальний графік занять?&q;,&q;v2.faqs.studying.question-15.answer&q;:&q;Звісно. Ви можете звернутися за допомогою до свого викладача в чат на платформі з особистого кабінету в браузері або додатку та узгодити всі зміни в графіку, викладач вам в цьому допоможе і внесе зміни. &l;a href=\&q;https://justschool.my.canva.site\&q; target=\&q;_blank\&q;&g;Інструкція&l;/a&g; як написати викладачу. &l;br&g; Або ви самостійно можете вносити зміни у графік в особистому кабінеті в графіку або через наш  &l;a href=\&q;https://t.me/JustKidsBot\&q; target=\&q;_blank\&q;&g;чат-бот&l;/a&g;. Крім того, в особистому кабінеті доступна функція скасування та перенесення уроків, скористатись нею можна у будь-який час.&q;,&q;v2.faqs.studying.question-15.title&q;:&q;Чи можна змінити графік занять?&q;,&q;v2.faqs.studying.question-16.answer&q;:&q;Щоб подивитися на домашнє завдання, яке вам задав учитель, перейдіть в особистий кабінет у розділ  &l;a href=\&q;https://id.justschool.me/login?redirect_uri=https://student.justschool.me/diary\&q; target=\&q;_blank\&q;&g;«Щоденник»&l;/a&g;. Ознайомившись із завданням, перейдіть у розділ &l;a href=\&q;https://id.justschool.me/login?redirect_uri=https://student.justschool.me/workbook\&q; target=\&q;_blank\&q;&g;«Навчання»&l;/a&g; і виберіть потрібний номер уроку й тему, яку викладач зазначив у щоденнику (наприклад, Section 1, урок 1.1). Ось і все, можете пер
