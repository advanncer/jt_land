&q;:&q;Дорослі&q;,&q;v2.main-page.cost.item3.title&q;:&q;Діти та підлітки&q;,&q;v2.main-page.cost.item4.title&q;:&q;Діти&q;,&q;v2.main-page.cost.per-lesson&q;:&q;за урок&q;,&q;v2.main-page.download.card1.text&q;:&q;Онлайн уроки англійської мови з викладачем&q;,&q;v2.main-page.download.card2.text&q;:&q;Доступ до тренувальних вправ і домашніх завдань&q;,&q;v2.main-page.download.title&q;:&q;Завантажте наш додаток і навчайтеся з мобілки будь-де&q;,&q;v2.main-page.feedbacks.item1.author&q;:&q;Світлана Алфьорова&q;,&q;v2.main-page.feedbacks.item1.text&q;:&q;Доброго дня! Мій син займається у школі майже рік. Ми дуже задоволені якістю навчання та послуги загалом. Все вчасно, якісно і завжди так, як зручно нам. Дякуємо школі за наші знання.&q;,&q;v2.main-page.feedbacks.item2.author&q;:&q;Наталія Шеремет&q;,&q;v2.main-page.feedbacks.item2.text&q;:&q;Добрий день! Школу JustSchool рекомендую, тому що це дуже зручно займатися онлайн! Викладача можна підбирати індивідуально для своєї дитини, що теж важливо для якісного навчання! Наша дитина дуже задоволена навчанням, займається вже близько 3-3.5 років, все подобається і є результат!&q;,&q;v2.main-page.feedbacks.item3.author&q;:&q;Олена Ган&q;,&q;v2.main-page.feedbacks.item3.text&q;:&q;Дитина (10 років, рівень - початковий) у захваті! Рекомендую!&q;,&q;v2.main-page.feedbacks.item4.author&q;:&q; Інна Веремчук&q;,&q;v2.main-page.feedbacks.item4.text&q;:&q;Доброго дня, однозначно раджу онлайн школу “JustSchool”. Кваліфіковані фахівці, відмінна платформа, дуже подобається методика та доступність викладання. Дитина займається третій рік, хороші результати, а головне з інтересом готується і з нетерпінням чекає наступного уроку з викладачем Анною. Дуже комунікабельні менеджери завжди допоможуть вирішити будь-яке питання. &q;,&q;v2.main-page.feedbacks.item5.author&q;:&q;Мілана&q;,&q;v2.main-page.feedbacks.item5.text&q;:&q;Чудовий варіант он-лайн навчання. Уроки проходять цікаво для дитини і видно результат. Перед початком навчання дитина спробувала кілька шкіл і викладачів, обрала Оксану з JustSchool.&q;,&q;v2.main-page.feedbacks.item6.author&q;:&q;Іван&q;,&q;v2.main-page.feedbacks.item6.text&q;:&q;Ребенок (10 лет, уровень - начальный) в восторге! Рекомендую!!!&q;,&q;v2.main-page.feedbacks.title&q;:&q;Відгуки&q;,&q;v2.main-page.form.choose-product.english-for-adults&q;:&q;Курс для дорослих&q;,&q;v2.main-page.form.choose-product.english-for-children&q;:&q;Курс для дітей&q;,&q;v2.main-page.form.choose-product.english-for-companies&q;:&q;Курс для компаній&q;,&q;v2.main-page.form.choose-product.english-for-preschoolers&q;:&q;Курс для дошкільнят (4-5 років)&q;,&q;v2.main-page.form.choose-product.english-for-teenagers&q;:&q;Курс для підлітків (10-17 років)&q;,&q;v2.main-page.header.actions.sign-in&q;:&q;Увійти&q;,&q;v2.main-page.header.actions.sign-up&q;:&q;Зареєструватися&q;,&q;v2.main-page.header.description&q;:&q;Онлайн курси англійської мови в школі JustSchool. Навчання для дітей, підлітків, дорослих та компаній. Допоможемо вам вивчити англійську швидко і легко.&q;,&q;v2.main-page.header.links.item1&q;:&q;Продукти&q;,&q;v2.main-page.header.links.item2&q;:&q;Форми навчання&q;,&q;v2.main-page.header.links.item3&q;:&q;Тест рівня&q;,&q;v2.main-page.header.links.item4&q;:&q;Контакти&q;,&q;v2.main-page.header.links.item5&q;:&q;Блог&q;,&q;v2.main-page.header.title&q;:&q;Курси англійської мови в онлайн-школі | JustSchool&q;,&q;v2.main-page.main-banner.item1&q;:&q;Інтерактивні онлайн-уроки англійської мови&q;,&q;v2.main-page.main-banner.item2&q;:&q;Індивідуальні та групові заняття&q;,&q;v2.main-page.main-banner.item3&q;:&q;Для дорослих і дітей&q;,&q;v2.main-page.question.faq-link&q;:&q;Розділ FAQ&q;,&q;v2.main-page.questions.item1.description&q;:&q;Наші онлайн уроки англійської мови проходять на інтерактивній платформі JustSchool. Тут ви можете спілкуватися з викладачем в режимі реального часу та виконувати цікаві інтерактивні завдання.&q;,&q;v2.main-page.questions.item1.title&q;:&q;Як проходить навчання?&q;,&q;v2.main-page.questions.item2.description&q;:&q;Наші курси з англійської мови підходять для дітей від 5 років та дорослих будь-якого віку. Ми навчаємо як початківців, так і досвідчених студентів. &q;,&q;v2.main-page.questions.item2.title&q;:&q;Чи є вікові обмеження або за рівнем англійської?&q;,&q;v2.main-page.questions.item3.description&q;:&q;Вчителі нашої онлайн школи англійської мови навчають через гру та використовують комунікативний підхід (communicative approach). Тобто 50–70% часу уроку учні спілкуються англійською.&q;,&q;v2.main-page.questions.item3.title&q;:&q;Яка в нас методика викладання?&q;,&q;v2.main-page.questions.item4.description&q;:&q;Викладачі JustSchool мають відповідний рівень знань та кваліфікації, серед них також є ті, що мають дипломи педагогічних і лінгвістичніх ВНЗ. Усі вони зможуть ефективно допомогти вам досягти бажаних результатів у навчанні. Лише 1 з 89 викладачів проходить багаторівневий відбір та приступає до викладання в JustSchool. Окрім того, вони постійно навчаються, підвищують свій рівень кваліфікації та консультуються з провідними методистами. А якщо ви плануєте підготовку до іспитів, то у нас є викладачі з міжнародними сертифікатами CELTA, DELTA або TEFL.&q;,&q;v2.main-page.questions.item4.title&q;:&q;Хто наші викладачі?&q;,&q;v2.main-page.questions.item5.description&q;:&q;Нашим учням найзручніше вчитися через браузер Google Chrome на комп’ютері або ноутбуці. Для уроків також знадобляться робоча вебкамера, мікрофон або гарнітура.&q;,&q;v2.main-page.questions.item5.title&q;:&q;З яких пристроїв краще займатися?&q;,&q;v2.main-page.questions.title&q;:&q;Відповіді на популярні запитання&q;,&q;v2.main-page.start-smart.action&q;:&q;Почни безкоштовно&q;,&q;v2.main-page.start-smart.subject-math&q;:&q;математика&q;,&q;v2.main-page.start-smart.subject-polish&q;:&q;польська&q;,&q;v2.main-page.start-smart.subject-programming&q;:&q;програмування&q;,&q;v2.main-page.start-smart.subject-ukrainian&q;:&q;українська&q;,&q;v2.main-page.start-smart.subject-zno&q;:&q;підготуємодозно&q;,&q;v2.main-page.start-smart.title&q;:&q;Вивчай шкільні предмети легко разом з &l;span class=\&q;accent\&q;&g;JustSmart&l;/span&g;&q;,&q;v2.main-page.target.action&q;:&q;Детальніше&q;,&q;v2.main-page.target.card1.list-item1&q;:&q;Ми навчаємо через гру та спілкування&q;,&q;v2.main-page.target.card1.list-item2&q;:&q;Забезпечуємо підготовку до школи й університету&q;,&q;v2.main-page.target.card1.list-item3&q;:&q;Допомагаємо підтягнути шкільну програму&q;,&q;v2.main-page.target.card1.list-item4&q;:&q;Формуємо звичку вчитися&q;,&q;v2.main-page.target.card1.subtitle&q;:&q;Наші інтерактивні уроки з елементами гри — чудове рішення для дітей різного віку, щоб з цікавістю вивчити англійську мову онлайн&q;,&q;v2.main-page.target.card1.title&q;:&q;Для дітей та підлітків&q;,&q;v2.main-page.target.card1.title-tablet&q;:&q;Для дітей&q;,&q;v2.main-page.target.card2.list-item1&q;:&q;Ми навчаємо англійської з нуля й покращуємо її до рівня профі&q;,&q;v2.main-page.target.card2.list-item2&q;:&q;Прокачуємо навички для роботи, подорожей чи проживання за кордоном&q;,&q;v2.main-page.target.card2.list-item3&q;:&q;Створюємо комфортні умови для швидкого й нестресового росту&q;,&q;v2.main-page.target.card2.list-item4&q;:&q;Вдосконалюємо пам&s;ять, творче мислення й комунікативні навички&q;,&q;v2.main-page.target.card2.subtitle&q;:&q;Завдяки персональному підходу й фокусі на цілях студенти швидко бачать прогрес, проходячи онлайн-уроки англійської мови в нашій школі&q;,&q;v2.main-page.target.card2.title&q;:&q;Для дорослих&q;,&q;v2.main-page.target.card3.list-item1&q;:&q;Допомагаємо опанувати бізнес-англійську&q;,&q;v2.main-page.target.card3.list-item2&q;:&q;Тренуємо навички проведення презентацій, перемовин&q;,&q;v2.main-page.target.card3.list-item3&q;:&q;Створюємо дружню атмосферу й можливості для командної роботи&q;,&q;v2.main-page.target.card3.list-item4&q;:&q;Доводимо до майстерності навички ділового листування й спілкування&q;,&q;v2.main-page.target.card3
